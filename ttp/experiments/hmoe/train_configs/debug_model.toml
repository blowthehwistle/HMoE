# torchtitan debug

[job]
dump_folder = "./outputs"
description = "HMoE debug training"
print_args = true
use_for_integration_test = false

[profiling]
enable_profiling = false
save_traces_folder = "profile_trace"
profile_freq = 10
enable_memory_snapshot = false
save_memory_snapshot_folder = "memory_snapshot"

[comm]
init_timeout_seconds = 36000
train_timeout_seconds = 36000

[metrics]
log_freq = 1
disable_color_printing = false
enable_tensorboard = false
save_tb_folder = "tb"
enable_wandb = false

[model]
name = "hmoe"
flavor = "debugmodel"
ssm_cp_version = 1
# test tokenizer.model, for debug purpose only
tokenizer_path = "./assets/hf/deepseek-moe-16b-base"
vocab_size = 106496 # original: 102400
eos_id = 100001
# converters = ["float8"]

[optimizer]
name = "AdamW"
lr = 8e-4
eps = 1e-8

[lr_scheduler]
warmup_steps = 100  # lr scheduler warm up, normally 20% of the train steps
decay_ratio = 0.8  # lr scheduler decay ratio, 80% of the train steps
decay_type = "linear"
lr_min_factor = 0.0

[training]
local_batch_size = 4
global_batch_size = -1
seq_len = 8192
max_norm = 1.0  # grad norm clipping
steps = 1000
dataset_type = "hf"
dataset = "c4_test"
dataset_path = "3rdparty/torchtitan/tests/assets/c4_test"
loss_function_type = "fused_cross_entropy"
seed = 1234
mtp_loss_weights = [1.0, 0.3]
# loss_mask_token_ids = [
#     120002,  # pad
# ]
# rope_theta = None

[compile]
enable = true

[inference]
# checkpoint_path = None
load_model_weights_only = true
mixed_precision_param = "float32"
mixed_precision_reduce = "float32"
use_inference_caches = true
enable_cpu_offload = false
enable_kvcache_cpu_offload = false
fsdp_reshard_after_forward = "default" # default / never / always

[parallelism]
data_parallel_replicate_degree = 1
data_parallel_shard_degree = -1
fsdp_reshard_after_forward = "default" # default / never / always
tensor_parallel_degree = 1
enable_async_tensor_parallel = false
pipeline_parallel_degree = 1
pipeline_parallel_microbatch_size = 1
context_parallel_degree = 1
disable_loss_parallel = true

[checkpoint]
enable_checkpoint = false
folder = "checkpoint"  # make sure is a shared folder
interval = 100
last_save_model_only = false # deprecated, last step will still save all
export_dtype = "float32"
async_mode = "async"  # ["disabled", "async", "async_with_pinned_mem"]
# initial_load_path = "/path/to/pretrained/checkpoint/step-x"
initial_load_model_only = false # true is only used for loading models trained by previous versions of the titan framework

[activation_checkpoint]
mode = "full"  # ["none", "selective", "full"]
selective_ac_option = '2'  # 'int' = ac every positive int layer or 'op', ac based on ops policy

[float8]
enable_fsdp_float8_all_gather = false
precompute_float8_dynamic_scale_for_fsdp = false
filter_fqns = ["output"]
