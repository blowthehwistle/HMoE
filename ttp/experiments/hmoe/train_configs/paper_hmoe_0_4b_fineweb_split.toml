# HMoE-0.4B FineWeb split run.
#
# Train data:
#   fineweb_10BT/sample/10BT/000_00000.parquet ... 012_00000.parquet
# Held-out validation data:
#   fineweb_10BT/sample/10BT/013_00000.parquet
#
# The train/validation paths are intentionally explicit so the held-out shard
# cannot accidentally leak into training through a broad *.parquet glob.

[job]
dump_folder = "./outputs/hmoe_0_4b_fineweb_split"
description = "HMoE-0.4B FineWeb train/held-out split"
print_args = true
use_for_integration_test = false

[profiling]
enable_profiling = false
save_traces_folder = "profile_trace"
profile_freq = 10
enable_memory_snapshot = false
save_memory_snapshot_folder = "memory_snapshot"

[comm]
init_timeout_seconds = 36000
train_timeout_seconds = 36000

[metrics]
log_freq = 10
disable_color_printing = false
enable_tensorboard = true
save_tb_folder = "tb"
enable_wandb = false

[model]
name = "hmoe"
flavor = "paper_hmoe_0_4b"
ssm_cp_version = 1
tokenizer_path = "./assets/hf/deepseek-moe-16b-base"
vocab_size = 106496
eos_id = 100001

[optimizer]
name = "AdamW"
lr = 1e-4
eps = 1e-8
weight_decay = 1e-5

[lr_scheduler]
warmup_steps = 1000
decay_ratio = 1.0
decay_type = "linear"
lr_min_factor = 1.0

[training]
type_name = "ttp"
local_batch_size = 1
global_batch_size = 640
seq_len = 4096
max_norm = 1.0
steps = 5000
dataset_type = "hf"
dataset = "parquet"
dataset_path = "fineweb_10BT/sample/10BT/00[0-9]_00000.parquet,fineweb_10BT/sample/10BT/01[0-2]_00000.parquet"
loss_function_type = "fused_cross_entropy"
seed = 12345
mtp_loss_weights = [1.0, 0.3]

[validation]
enabled = true
dataset = "parquet"
dataset_path = "fineweb_10BT/sample/10BT/013_00000.parquet"
local_batch_size = 1
seq_len = 4096
freq = 500
steps = 64

[compile]
enable = true

[inference]
load_model_weights_only = true
mixed_precision_param = "bfloat16"
mixed_precision_reduce = "bfloat16"
use_inference_caches = true
enable_cpu_offload = false
enable_kvcache_cpu_offload = false
fsdp_reshard_after_forward = "default"

[parallelism]
data_parallel_replicate_degree = 1
data_parallel_shard_degree = -1
fsdp_reshard_after_forward = "default"
tensor_parallel_degree = 1
enable_async_tensor_parallel = false
pipeline_parallel_degree = 1
pipeline_parallel_microbatch_size = 1
context_parallel_degree = 1
disable_loss_parallel = true

[checkpoint]
enable_checkpoint = true
folder = "checkpoint"
interval = 500
last_save_model_only = false
export_dtype = "float32"
async_mode = "async"
initial_load_model_only = false

[activation_checkpoint]
mode = "full"
selective_ac_option = "2"

[float8]
enable_fsdp_float8_all_gather = false
precompute_float8_dynamic_scale_for_fsdp = false
filter_fqns = ["output"]
