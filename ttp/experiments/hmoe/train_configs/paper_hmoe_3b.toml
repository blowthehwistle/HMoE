# Paper-style HMoE-3B configuration.
#
# Architecture follows the EMNLP appendix: 12 Transformer blocks, 8
# heterogeneous experts, Top-K k=2, and aggregate expert hidden dimension
# 32,768 with arithmetic expert sizes.
#
# Note: the paper used a LLaMA2 tokenizer with a 32k vocabulary. This repo
# currently ships DeepSeek tokenizer assets, so this runnable config keeps
# vocab_size=106496. For a closer paper parameter count, use a LLaMA2 tokenizer
# and set vocab_size to 32768, which satisfies this repo's 8192 padding check.

[job]
dump_folder = "./outputs"
description = "Paper-style HMoE-3B training"
print_args = true
use_for_integration_test = false

[profiling]
enable_profiling = false
save_traces_folder = "profile_trace"
profile_freq = 10
enable_memory_snapshot = false
save_memory_snapshot_folder = "memory_snapshot"

[comm]
init_timeout_seconds = 36000
train_timeout_seconds = 36000

[metrics]
log_freq = 1
disable_color_printing = false
enable_tensorboard = false
save_tb_folder = "tb"
enable_wandb = false

[model]
name = "hmoe"
flavor = "paper_hmoe_3b"
ssm_cp_version = 1
tokenizer_path = "./assets/hf/deepseek-moe-16b-base"
vocab_size = 106496
eos_id = 100001

[optimizer]
name = "AdamW"
lr = 1e-4
eps = 1e-8
weight_decay = 1e-5

[lr_scheduler]
warmup_steps = 1000
decay_ratio = 1.0
decay_type = "linear"
lr_min_factor = 1.0

[training]
local_batch_size = 1
global_batch_size = 640
seq_len = 4096
max_norm = 1.0
steps = 40000
dataset_type = "hf"
dataset = "c4_test"
dataset_path = "3rdparty/torchtitan/tests/assets/c4_test"
loss_function_type = "fused_cross_entropy"
seed = 12345
mtp_loss_weights = [1.0, 0.3]

[compile]
enable = true

[inference]
load_model_weights_only = true
mixed_precision_param = "bfloat16"
mixed_precision_reduce = "bfloat16"
use_inference_caches = true
enable_cpu_offload = false
enable_kvcache_cpu_offload = false
fsdp_reshard_after_forward = "default"

[parallelism]
data_parallel_replicate_degree = 1
data_parallel_shard_degree = -1
fsdp_reshard_after_forward = "default"
tensor_parallel_degree = 1
enable_async_tensor_parallel = false
pipeline_parallel_degree = 1
pipeline_parallel_microbatch_size = 1
context_parallel_degree = 1
disable_loss_parallel = true

[checkpoint]
enable_checkpoint = true
folder = "checkpoint"
interval = 1000
last_save_model_only = false
export_dtype = "float32"
async_mode = "async"
initial_load_model_only = false

[activation_checkpoint]
mode = "full"
selective_ac_option = "2"

[float8]
enable_fsdp_float8_all_gather = false
precompute_float8_dynamic_scale_for_fsdp = false
filter_fqns = ["output"]
