# Short HMoE-0.4B Top-K pilot on the fixed RedPajama mini_25g split.
# This run is intended for routing/imbalance and early validation comparisons.

[job]
dump_folder = "./outputs/mini_25g/hmoe_0_4b_topk"
description = "HMoE-0.4B Top-K fixed RedPajama mini_25g pilot"
print_args = true
use_for_integration_test = false

[profiling]
enable_profiling = false
save_traces_folder = "profile_trace"
profile_freq = 10
enable_memory_snapshot = false
save_memory_snapshot_folder = "memory_snapshot"

[comm]
init_timeout_seconds = 36000
train_timeout_seconds = 36000

[metrics]
log_freq = 10
disable_color_printing = false
enable_tensorboard = true
save_tb_folder = "tb"
enable_wandb = false

[model]
name = "hmoe"
flavor = "paper_hmoe_0_4b"
ssm_cp_version = 1
tokenizer_path = "./assets/hf/Llama-2-7b-hf"
vocab_size = 32768
eos_id = 2

[optimizer]
name = "AdamW"
lr = 1e-4
eps = 1e-8
weight_decay = 1e-5

[lr_scheduler]
warmup_steps = 10
decay_ratio = 1.0
decay_type = "linear"
lr_min_factor = 1.0

[training]
type_name = "ttp"
local_batch_size = 1
global_batch_size = 640
seq_len = 4096
max_norm = 1.0
steps = 100
dataset_type = "hf"
dataset = "json"
dataset_path = "@redpajama_1T/mini_splits/mini_25g/train_manifest.txt"
loss_function_type = "fused_cross_entropy"
seed = 12345
mtp_loss_weights = [1.0, 0.3]

[validation]
enabled = true
dataset = "json"
dataset_path = "@redpajama_1T/mini_splits/mini_25g/validation_manifest.txt"
local_batch_size = 1
seq_len = 4096
freq = 50
steps = 16

[compile]
enable = true

[inference]
load_model_weights_only = true
mixed_precision_param = "bfloat16"
mixed_precision_reduce = "bfloat16"
use_inference_caches = true
enable_cpu_offload = false
enable_kvcache_cpu_offload = false
fsdp_reshard_after_forward = "default"

[parallelism]
data_parallel_replicate_degree = 1
data_parallel_shard_degree = -1
fsdp_reshard_after_forward = "default"
tensor_parallel_degree = 1
enable_async_tensor_parallel = false
pipeline_parallel_degree = 1
pipeline_parallel_microbatch_size = 1
context_parallel_degree = 1
disable_loss_parallel = true

[checkpoint]
enable_checkpoint = true
folder = "checkpoint"
interval = 50
last_save_model_only = false
export_dtype = "float32"
async_mode = "async"
initial_load_model_only = false
enable_first_step_checkpoint = true

[activation_checkpoint]
mode = "full"
selective_ac_option = "2"

[float8]
enable_fsdp_float8_all_gather = false
precompute_float8_dynamic_scale_for_fsdp = false
filter_fqns = ["output"]
